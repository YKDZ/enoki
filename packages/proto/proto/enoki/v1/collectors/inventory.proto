syntax = "proto3";

package enoki.v1;

import "enoki/v1/collector.proto";

message Inventory {
  string hostname = 1;
  string os = 2;
  string kernel = 3;
  string architecture = 4;
  uint32 cpu_count = 5;
  uint64 memory_total_bytes = 6;
  repeated FilesystemInventory filesystems = 7;
  repeated NetworkInterfaceInventory network_interfaces = 8;
  string probe_version = 9;
  string cpu_model = 10;
  uint32 process_count = 11;
  uint32 thread_count = 12;
  uint64 cpu_cache_l3_bytes = 13;
  uint32 cpu_base_frequency_mhz = 14;
  uint32 cpu_socket_count = 15;
  uint32 cpu_physical_count = 16;
  CollectorCapabilities collector_capabilities = 17;
}

message HostProfileSnapshot {
  string hostname = 1;
  string os = 2;
  string kernel = 3;
  string architecture = 4;
  uint32 cpu_count = 5;
  uint64 memory_total_bytes = 6;
  repeated FilesystemInventory filesystems = 7;
  repeated NetworkInterfaceInventory network_interfaces = 8;
  string probe_version = 9;
  string cpu_model = 10;
  uint32 process_count = 11;
  uint32 thread_count = 12;
  uint64 cpu_cache_l3_bytes = 13;
  uint32 cpu_base_frequency_mhz = 14;
  uint32 cpu_socket_count = 15;
  uint32 cpu_physical_count = 16;
  CollectorCapabilities collector_capabilities = 17;
}

message Snapshot {
  string collector_id = 1;
  string snapshot_hash = 2;

  oneof payload {
    HostProfileSnapshot host_profile = 10;
  }
}

message FilesystemInventory {
  string mount_point = 1;
  string filesystem_type = 2;
  uint64 total_bytes = 3;
  uint64 available_bytes = 4;
}

message NetworkInterfaceInventory {
  string name = 1;
  repeated string addresses = 2;
}
