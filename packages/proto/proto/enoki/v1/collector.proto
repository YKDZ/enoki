syntax = "proto3";

package enoki.v1;

import "enoki/v1/collectors/disk_health.proto";

message OfficialCollectorCapabilities {
  reserved 1 to 8, 10;
  reserved "cpu", "memory", "disk", "network", "load", "uptime", "temperature",
    "battery", "host_profile";

  DiskHealthCollectorCapability disk_health = 9;
}

message CollectorCapabilities {
  OfficialCollectorCapabilities official = 1;
}
