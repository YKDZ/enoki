syntax = "proto3";

package enoki.v1;

message CollectorAvailability {
  bool available = 1;
}

message OfficialCollectorCapabilities {
  CollectorAvailability cpu = 1;
  CollectorAvailability memory = 2;
  CollectorAvailability disk = 3;
  CollectorAvailability network = 4;
  CollectorAvailability load = 5;
  CollectorAvailability uptime = 6;
  CollectorAvailability temperature = 7;
  CollectorAvailability battery = 8;
  CollectorAvailability disk_health = 9;
  CollectorAvailability inventory = 10;
}

message CollectorCapabilities {
  OfficialCollectorCapabilities official = 1;
}
