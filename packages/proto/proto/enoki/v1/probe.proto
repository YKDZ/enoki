syntax = "proto3";

package enoki.v1;

message Inventory {
  string hostname = 1;
  string os = 2;
  string kernel = 3;
  string architecture = 4;
  uint32 cpu_count = 5;
  uint64 memory_total_bytes = 6;
  repeated FilesystemInventory filesystems = 7;
  repeated NetworkInterfaceInventory network_interfaces = 8;
  string probe_version = 9;
  string cpu_model = 10;
  uint32 process_count = 11;
  uint32 thread_count = 12;
  uint64 cpu_cache_l3_bytes = 13;
  uint32 cpu_base_frequency_mhz = 14;
  uint32 cpu_socket_count = 15;
  uint32 cpu_physical_count = 16;
}

message FilesystemInventory {
  string mount_point = 1;
  string filesystem_type = 2;
  uint64 total_bytes = 3;
  uint64 available_bytes = 4;
}

message NetworkInterfaceInventory {
  string name = 1;
  repeated string addresses = 2;
}

message ProbeRegistrationRequest {
  string enrollment_token = 1;
  Inventory inventory = 2;
}

message ProbeRegistrationResponse {
  string probe_id = 1;
  string probe_secret = 2;
  int64 server_time_ms = 3;
  ProbeConfigurationResponse initial_configuration = 4;
}

message ProbeReportRequest {
  string probe_id = 1;
  string boot_id = 2;
  uint64 sequence_start = 3;
  uint64 sequence_end = 4;
  string inventory_hash = 5;
  string probe_configuration_version = 6;
  repeated MetricSample metrics = 7;
  Inventory inventory = 8;
  ProbeConfigurationError probe_configuration_error = 9;
}

message ProbeConfigurationError {
  string failed_version = 1;
  string error_code = 2;
  string message = 3;
}

message MetricSample {
  uint64 sequence = 1;
  int64 collected_at_ms = 2;
  optional double cpu_percent = 3;
  optional uint64 memory_used_bytes = 4;
  optional double load_1 = 5;
  optional double load_5 = 6;
  optional double load_15 = 7;
  optional uint64 uptime_seconds = 8;
  repeated DiskUsageMetric disks = 9;
  repeated NetworkInterfaceMetric network_interfaces = 10;
  repeated CpuCoreMetric cpu_cores = 11;
  optional uint64 memory_total_bytes = 12;
}

message CpuCoreMetric {
  string name = 1;
  uint64 user = 2;
  uint64 nice = 3;
  uint64 system = 4;
  uint64 idle = 5;
  uint64 iowait = 6;
  uint64 irq = 7;
  uint64 softirq = 8;
  uint64 steal = 9;
  double usage_percent = 10;
}

message DiskUsageMetric {
  string mount_point = 1;
  string filesystem_type = 2;
  uint64 total_bytes = 3;
  uint64 used_bytes = 4;
  uint64 available_bytes = 5;
}

message NetworkInterfaceMetric {
  string name = 1;
  uint64 rx_bytes = 2;
  uint64 tx_bytes = 3;
  uint64 rx_bytes_delta = 4;
  uint64 tx_bytes_delta = 5;
}

message ProbeReportResponse {
  uint64 accepted_sequence_end = 1;
  int64 server_time_ms = 2;
  string current_probe_configuration_version = 3;
  bool inventory_needed = 4;
}

message ProbeConfigurationRequest {
  string probe_id = 1;
  string current_version = 2;
}

message ProbeConfigurationResponse {
  string version = 1;
  uint32 metrics_collection_interval_seconds = 2;
  uint32 reporting_batch_interval_seconds = 3;
  bool collect_cpu = 4;
  bool collect_memory = 5;
  bool collect_disk = 6;
  bool collect_network = 7;
  bool collect_load = 8;
  bool collect_uptime = 9;
}
