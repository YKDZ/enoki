name: Release Hub

on:
  push:
    tags:
      - "hub-v*"
  workflow_dispatch:
    inputs:
      version:
        description: Hub image version, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-hub-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release-version:
    name: Resolve Hub version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#hub-}"
          else
            echo "::error::Hub version is required for manual runs."
            exit 1
          fi

          if ! printf '%s' "$version" | grep -Eq '^v[0-9]+[.][0-9]+[.][0-9]+'; then
            echo "::error::Hub version must start with a semantic tag like v0.1.0."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

  checks:
    name: Hub checks
    needs: release-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

      - name: Check protobuf outputs
        run: pnpm run proto:check

  publish-hub-image:
    name: Publish Hub image
    needs: [release-version, checks]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Login to GHCR
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Build and push Hub image
        env:
          VERSION: ${{ needs.release-version.outputs.version }}
        run: |
          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/enoki-hub"
          docker buildx create --use
          docker buildx build \
            -f apps/hub/Dockerfile \
            --platform linux/amd64 \
            --tag "${image}:${VERSION}" \
            --tag "${image}:latest" \
            --push \
            .
