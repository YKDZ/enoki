name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name || inputs.version }}
  cancel-in-progress: false

jobs:
  release-version:
    name: Resolve release version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          else
            echo "::error::Release version is required for manual runs."
            exit 1
          fi

          if ! printf '%s' "$version" | grep -Eq '^v[0-9]+[.][0-9]+[.][0-9]+'; then
            echo "::error::Release version must start with a semantic tag like v0.1.0."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

  node-checks:
    name: Node checks
    needs: release-version
    uses: ./.github/workflows/reusable-node-checks.yml
    with:
      run-build: true

  rust-checks:
    name: Rust checks
    needs: release-version
    uses: ./.github/workflows/reusable-rust-checks.yml

  build-probe:
    name: Build Probe
    needs: [release-version, rust-checks]
    uses: ./.github/workflows/reusable-build-probe.yml
    with:
      package-artifacts: true
      version: ${{ needs.release-version.outputs.version }}

  publish-probe-release:
    name: Publish Probe release assets
    needs: [release-version, build-probe]
    permissions:
      contents: write
    secrets: inherit
    uses: ./.github/workflows/reusable-publish-probe-release.yml
    with:
      version: ${{ needs.release-version.outputs.version }}

  publish-hub-image:
    name: Publish Hub image
    needs: [release-version, node-checks, publish-probe-release]
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/reusable-hub-image.yml
    with:
      include-probe-assets: true
      push-image: true
      version: ${{ needs.release-version.outputs.version }}

  publish-size-badges:
    name: Publish size badges
    needs: [release-version, publish-hub-image]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Login to GHCR
        env:
          GHCR_TOKEN: ${{ github.token }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Read release and image sizes
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.release-version.outputs.version }}
        run: |
          mkdir -p dist/size-badges
          owner="$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/enoki-hub"

          gh release view "$VERSION" --json assets > dist/release-assets.json
          docker buildx imagetools inspect "${image}:${VERSION}" --raw > dist/hub-image-index.json
          manifest_digest="$(node -e 'const fs = require("fs"); const index = JSON.parse(fs.readFileSync(process.argv[1], "utf8")); const manifest = index.manifests.find((item) => item.platform?.os === "linux" && item.platform?.architecture === "amd64" && item.mediaType?.includes("manifest")); if (!manifest) { throw new Error("Missing linux/amd64 Hub image manifest."); } process.stdout.write(manifest.digest);' dist/hub-image-index.json)"
          docker buildx imagetools inspect "${image}:${VERSION}@${manifest_digest}" --raw > dist/hub-image-manifest.json

          node scripts/create-size-badge-assets.mjs \
            --release-json dist/release-assets.json \
            --hub-manifest dist/hub-image-manifest.json \
            --out dist/size-badges

      - name: Publish size badge assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.release-version.outputs.version }}
        run: gh release upload "$VERSION" dist/size-badges/*.{json,svg} --clobber
