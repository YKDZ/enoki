name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-checks:
    name: Node checks
    uses: ./.github/workflows/reusable-node-checks.yml
    with:
      affected: ${{ github.event_name == 'pull_request' }}
      run-build: true

  rust-checks:
    name: Rust checks
    uses: ./.github/workflows/reusable-rust-checks.yml

  e2e:
    name: Playwright e2e
    needs: node-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright e2e
        run: pnpm run e2e

  probe-binaries:
    name: Probe binaries
    needs: rust-checks
    uses: ./.github/workflows/reusable-build-probe.yml

  hub-image:
    name: Hub Docker image
    needs: node-checks
    uses: ./.github/workflows/reusable-hub-image.yml
    with:
      version: ci
