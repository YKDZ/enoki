name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-checks:
    name: Node checks
    uses: ./.github/workflows/reusable-node-checks.yml
    with:
      run-build: true

  rust-checks:
    name: Rust checks
    uses: ./.github/workflows/reusable-rust-checks.yml

  probe-binaries:
    name: Probe binaries
    needs: rust-checks
    uses: ./.github/workflows/reusable-build-probe.yml

  hub-image:
    name: Hub Docker image
    needs: node-checks
    uses: ./.github/workflows/reusable-hub-image.yml
    with:
      version: ci
