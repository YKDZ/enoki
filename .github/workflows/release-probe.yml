name: Release Probe

on:
  push:
    tags:
      - "probe-v*"
  workflow_dispatch:
    inputs:
      version:
        description: Probe version, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-probe-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release-version:
    name: Resolve Probe version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#probe-}"
          else
            echo "::error::Probe version is required for manual runs."
            exit 1
          fi

          if ! printf '%s' "$version" | grep -Eq '^v[0-9]+[.][0-9]+[.][0-9]+'; then
            echo "::error::Probe version must start with a semantic tag like v0.1.0."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

  checks:
    name: Probe checks
    needs: release-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Format
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Check protobuf outputs
        run: pnpm run proto:check

      - name: Rust checks
        run: pnpm run rust:check

  build-probe:
    name: Build Probe (${{ matrix.target }})
    needs: checks
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add ${{ matrix.target }}

      - name: Build Probe
        env:
          ENOKI_PROBE_VERSION: ${{ needs.release-version.outputs.version }}
        run: cargo build -p enoki-probe --release --target ${{ matrix.target }}

      - name: Package Probe
        run: |
          mkdir -p "dist/enoki-probe-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/enoki-probe" "dist/enoki-probe-${{ matrix.target }}/enoki-probe"
          tar -C "dist/enoki-probe-${{ matrix.target }}" -czf "dist/enoki-probe-${{ matrix.target }}.tar.gz" enoki-probe
          cd dist
          sha256sum "enoki-probe-${{ matrix.target }}.tar.gz" > "enoki-probe-${{ matrix.target }}.tar.gz.sha256"

      - name: Upload Probe artifact
        uses: actions/upload-artifact@v7
        with:
          name: enoki-probe-${{ matrix.target }}
          path: |
            dist/enoki-probe-${{ matrix.target }}.tar.gz
            dist/enoki-probe-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  publish-probe-release:
    name: Publish Probe release artifacts
    needs: [release-version, build-probe]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download Probe artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: enoki-probe-*
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-version.outputs.version }}
        run: |
          if ! gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TAG" \
              --notes "Enoki Probe $RELEASE_TAG"
          fi

          gh release upload "$RELEASE_TAG" scripts/install-probe.sh dist/* --clobber
